<!DOCTYPE html><html><head><meta charset="utf-8"><title>C</title><style>
html,body{height:100%;margin:0;background:#070000;font-family:Consolas,monospace;overflow:hidden}
#vig{position:fixed;inset:0;background:radial-gradient(ellipse at center,rgba(80,0,0,.35) 0%,transparent 50%,rgba(0,0,0,.75) 100%);pointer-events:none}
#scan{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent 0,rgba(0,0,0,.25) 2px,transparent 3px);pointer-events:none}
.wrap{display:flex;align-items:center;justify-content:center;height:100%}
.panel{width:920px;background:rgba(20,0,0,.95);border:1px solid #ff2233;
 box-shadow:0 0 70px rgba(255,34,51,.35),inset 0 0 70px rgba(255,34,51,.06);padding-bottom:30px}
.stripes{height:18px;background:repeating-linear-gradient(135deg,#ff2233 0 22px,#150000 22px 44px);opacity:.85}
.top{padding:12px 26px;border-bottom:1px solid rgba(255,34,51,.5);font-size:13px;letter-spacing:3px;color:#ff6b75;background:rgba(255,34,51,.08)}
.clock{float:right;font-size:22px;font-weight:bold;color:#ff2233;text-shadow:0 0 14px #f00;animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.5}}
.body{padding:24px 34px 0}
h1{font-size:34px;color:#ff2233;text-shadow:0 0 16px rgba(255,0,0,.8);margin:6px 0;letter-spacing:2px}
.sub{font-size:14px;color:#ff8d94;margin-bottom:18px}
.warn{display:inline-block;font-size:11px;letter-spacing:3px;color:#000;background:#ff2233;padding:3px 10px;margin-bottom:14px;font-weight:bold}
.dots span{display:inline-block;width:40px;height:9px;margin-right:9px;border:1px solid #7a1018;background:#1d0003;vertical-align:middle}
.dots .on{background:#ff2233;box-shadow:0 0 12px rgba(255,34,51,.9)}
.ptxt{font-size:13px;letter-spacing:2px;color:#b04a52;margin-left:10px}
.cat{font-size:12px;letter-spacing:4px;color:#b04a52;margin:20px 0 8px}
.q{font-size:38px;color:#ffd6d9;text-shadow:0 0 12px rgba(255,34,51,.6);margin-bottom:20px}
input{font-size:28px;width:440px;padding:10px 14px;background:#170003;color:#ffd6d9;border:2px solid #7a1018;outline:none;font-family:inherit}
button{font-size:20px;letter-spacing:2px;padding:12px 34px;margin-left:16px;background:#240007;color:#ff2233;border:2px solid #ff2233;font-family:inherit;text-shadow:0 0 8px rgba(255,0,0,.7)}
.hint{font-size:12px;color:#8a3a40;margin-top:12px}
</style></head><body>
<div id="vig"></div><div id="scan"></div>
<div class="wrap"><div class="panel">
<div class="stripes"></div>
<div class="top"><span class="clock">02:41</span>OVERRIDE // WAKE PROTOCOL &nbsp;[ WAKE UP ]</div>
<div class="body">
<div class="warn">&#9888; SUBJECT UNCONSCIOUS — INTERVENTION ACTIVE</div>
<h1>IDENTITY VERIFICATION</h1>
<div class="sub">Answer each question to prove consciousness and disable the alarm.</div>
<div class="dots"><span class="on"></span><span></span><span></span><span class="ptxt">VERIFIED 1 / 3</span></div>
<div class="cat">ARITHMETIC</div>
<div class="q">47 &#215; 28 =</div>
<div><input value="131"><button>&gt; SUBMIT</button></div>
<div class="hint">number / expression, e.g. 12x^3-10x+2</div>
</div></div></div>
</body></html>
