<!DOCTYPE html><html><head><meta charset="utf-8"><title>A</title><style>
html,body{height:100%;margin:0;background:#000;font-family:Consolas,monospace;overflow:hidden}
#vig{position:fixed;inset:0;background:radial-gradient(ellipse at center,rgba(0,40,15,.25) 0%,transparent 45%,rgba(0,0,0,.65) 100%);pointer-events:none}
#scan{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent 0,rgba(0,0,0,.22) 2px,transparent 3px);pointer-events:none}
.wrap{display:flex;align-items:center;justify-content:center;height:100%}
.panel{width:900px;background:rgba(0,16,6,.94);border:1px solid #00ff66;border-radius:12px;
 box-shadow:0 0 70px rgba(0,255,102,.30),0 0 140px rgba(0,255,102,.12),inset 0 0 70px rgba(0,255,102,.06);padding-bottom:30px}
.top{padding:14px 26px;border-bottom:1px solid rgba(0,255,102,.4);background:rgba(0,255,102,.07);border-radius:12px 12px 0 0;
 font-size:13px;letter-spacing:3px;color:#0f8}
.clock{float:right;font-size:22px;font-weight:bold;color:#7CFFB0;text-shadow:0 0 10px #0f8}
.body{padding:24px 34px 0}
h1{font-size:34px;color:#00ff66;text-shadow:0 0 14px #00ff66;margin:6px 0;letter-spacing:1px}
.sub{font-size:14px;color:#7CFFB0;margin-bottom:18px}
.dots span{display:inline-block;width:40px;height:9px;margin-right:9px;border:1px solid #0a5;border-radius:5px;background:#03200f;vertical-align:middle}
.dots .on{background:#00ff66;box-shadow:0 0 12px rgba(0,255,102,.9)}
.dots .cur{border-color:#00ff88;box-shadow:0 0 7px rgba(0,255,102,.5)}
.ptxt{font-size:13px;letter-spacing:2px;color:#0a7;margin-left:10px}
.cat{font-size:12px;letter-spacing:4px;color:#0a7;margin:22px 0 8px}
.q{font-size:38px;color:#aeffd2;text-shadow:0 0 12px rgba(0,255,102,.6);margin-bottom:20px}
input{font-size:28px;width:440px;padding:10px 14px;background:#001a0a;color:#aeffd2;border:2px solid #0a5;border-radius:8px;outline:none;font-family:Consolas,monospace;box-shadow:0 0 16px rgba(0,255,102,.25)}
button{font-size:20px;letter-spacing:2px;padding:12px 34px;margin-left:16px;background:#00210f;color:#00ff88;border:2px solid #00ff66;border-radius:8px;font-family:Consolas,monospace;text-shadow:0 0 8px #0f8}
.hint{font-size:12px;color:#4f9f74;margin-top:12px}
.blink{animation:bl 1s steps(1) infinite}@keyframes bl{50%{opacity:0}}
</style></head><body>
<div id="vig"></div><div id="scan"></div>
<div class="wrap"><div class="panel">
<div class="top"><span class="clock">02:41</span>OVERRIDE // WAKE PROTOCOL &nbsp;[ WAKE UP ]</div>
<div class="body">
<h1>IDENTITY VERIFICATION</h1>
<div class="sub">Answer each question to prove consciousness and disable the alarm.<span class="blink">_</span></div>
<div class="dots"><span class="on"></span><span class="cur"></span><span></span><span class="ptxt">VERIFIED 1 / 3</span></div>
<div class="cat">ARITHMETIC</div>
<div class="q">47 &#215; 28 =</div>
<div><input value="131"><button>&gt; SUBMIT</button></div>
<div class="hint">number / expression, e.g. 12x^3-10x+2</div>
</div></div></div>
</body></html>
