<!DOCTYPE html><html><head><meta charset="utf-8"><title>D</title><style>
html,body{height:100%;margin:0;background:#03020a;font-family:"Cascadia Mono",Consolas,monospace;overflow:hidden}
#grid{position:fixed;inset:0;background:linear-gradient(rgba(0,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,255,.05) 1px,transparent 1px);background-size:44px 44px;pointer-events:none}
#vig{position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.8) 100%);pointer-events:none}
.wrap{display:flex;align-items:center;justify-content:center;height:100%}
.panel{width:920px;background:rgba(6,4,20,.95);border:1px solid #0ff;position:relative;
 clip-path:polygon(0 0,calc(100% - 28px) 0,100% 28px,100% 100%,28px 100%,0 calc(100% - 28px));
 box-shadow:0 0 60px rgba(0,255,255,.25),0 0 120px rgba(255,0,255,.12);padding-bottom:30px}
.top{padding:14px 26px;border-bottom:1px solid rgba(0,255,255,.4);font-size:13px;letter-spacing:3px;color:#0ff;background:linear-gradient(90deg,rgba(0,255,255,.12),rgba(255,0,255,.10))}
.clock{float:right;font-size:22px;font-weight:bold;color:#f0f;text-shadow:0 0 12px rgba(255,0,255,.8)}
.body{padding:24px 34px 0}
h1{font-size:36px;margin:6px 0;letter-spacing:2px;color:#fff;position:relative;display:inline-block;
 text-shadow:2px 0 #f0f,-2px 0 #0ff,0 0 18px rgba(0,255,255,.5)}
.sub{font-size:14px;color:#7ee6e6;margin-bottom:18px}
.dots span{display:inline-block;width:44px;height:8px;margin-right:8px;background:#0a0a26;border:1px solid #066;transform:skewX(-22deg);vertical-align:middle}
.dots .on{background:#0ff;box-shadow:0 0 14px rgba(0,255,255,.9)}
.dots .cur{border-color:#f0f;box-shadow:0 0 10px rgba(255,0,255,.7)}
.ptxt{font-size:13px;letter-spacing:2px;color:#08a;margin-left:10px}
.cat{font-size:12px;letter-spacing:4px;color:#f0f;margin:22px 0 8px}
.q{font-size:38px;color:#eafcff;text-shadow:0 0 14px rgba(0,255,255,.7);margin-bottom:20px}
input{font-size:28px;width:440px;padding:10px 14px;background:#070718;color:#eafcff;border:2px solid #088;outline:none;font-family:inherit;transform:skewX(-4deg)}
button{font-size:20px;letter-spacing:2px;padding:12px 34px;margin-left:16px;background:linear-gradient(135deg,#0a0a26,#13002a);color:#0ff;border:2px solid #0ff;font-family:inherit;transform:skewX(-4deg);text-shadow:0 0 10px rgba(0,255,255,.8)}
.hint{font-size:12px;color:#3d7d8a;margin-top:12px}
</style></head><body>
<div id="grid"></div><div id="vig"></div>
<div class="wrap"><div class="panel">
<div class="top"><span class="clock">02:41</span>OVERRIDE // WAKE PROTOCOL &nbsp;[ WAKE UP ]</div>
<div class="body">
<h1>IDENTITY VERIFICATION</h1>
<div class="sub">Answer each question to prove consciousness and disable the alarm.</div>
<div class="dots"><span class="on"></span><span class="cur"></span><span></span><span class="ptxt">VERIFIED 1 / 3</span></div>
<div class="cat">// ARITHMETIC</div>
<div class="q">47 &#215; 28 =</div>
<div><input value="131"><button>&gt; SUBMIT</button></div>
<div class="hint">number / expression, e.g. 12x^3-10x+2</div>
</div></div></div>
</body></html>
