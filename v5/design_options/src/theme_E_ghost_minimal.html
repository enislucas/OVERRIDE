<!DOCTYPE html><html><head><meta charset="utf-8"><title>E</title><style>
html,body{height:100%;margin:0;background:#050505;font-family:"Cascadia Mono",Consolas,monospace;overflow:hidden;color:#e8e8e8}
.wrap{display:flex;align-items:center;justify-content:center;height:100%}
.panel{width:860px;padding:8px 0 40px}
.top{font-size:12px;letter-spacing:5px;color:#666;padding-bottom:18px;border-bottom:1px solid #222;margin-bottom:34px}
.clock{float:right;font-size:18px;color:#e8e8e8;letter-spacing:2px}
h1{font-size:44px;font-weight:normal;color:#fff;margin:0 0 10px;letter-spacing:-1px}
.sub{font-size:14px;color:#777;margin-bottom:30px}
.dots span{display:inline-block;width:54px;height:3px;margin-right:6px;background:#222;vertical-align:middle}
.dots .on{background:#00ff66}
.dots .cur{background:#555}
.ptxt{font-size:12px;letter-spacing:3px;color:#666;margin-left:12px}
.cat{font-size:11px;letter-spacing:5px;color:#00ff66;margin:40px 0 10px}
.q{font-size:46px;color:#fff;margin-bottom:28px;font-weight:300}
input{font-size:26px;width:430px;padding:12px 0;background:transparent;color:#fff;border:none;border-bottom:2px solid #333;outline:none;font-family:inherit}
input:focus{border-color:#00ff66}
button{font-size:15px;letter-spacing:3px;padding:14px 38px;margin-left:24px;background:#fff;color:#000;border:none;font-family:inherit;font-weight:bold}
.hint{font-size:12px;color:#555;margin-top:16px}
</style></head><body>
<div class="wrap"><div class="panel">
<div class="top"><span class="clock">02:41</span>OVERRIDE / WAKE PROTOCOL / WAKE UP</div>
<h1>Identity verification</h1>
<div class="sub">Answer each question to prove consciousness and disable the alarm.</div>
<div class="dots"><span class="on"></span><span class="cur"></span><span></span><span class="ptxt">1 / 3</span></div>
<div class="cat">ARITHMETIC</div>
<div class="q">47 &#215; 28 =</div>
<div><input value="131"><button>SUBMIT</button></div>
<div class="hint">number / expression — 12x^3-10x+2</div>
</div></div>
</body></html>
