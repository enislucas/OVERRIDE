<!DOCTYPE html><html><head><meta charset="utf-8"><title>fx1</title><style>
html,body{height:100%;margin:0;background:#000;overflow:hidden;font-family:Consolas,monospace}
canvas{position:fixed;inset:0}
.tag{position:fixed;left:40px;bottom:34px;color:#aeffd2;font-size:22px;letter-spacing:3px;background:rgba(0,16,6,.85);border:1px solid #00ff66;padding:14px 24px;z-index:2}
.panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;background:rgba(0,14,5,.90);border:1px solid #00ff66;border-radius:10px;padding:28px 34px;z-index:2;box-shadow:0 0 50px rgba(0,255,102,.3)}
.panel h1{color:#00ff66;font-size:26px;margin:0 0 8px;text-shadow:0 0 12px #00ff66}
.panel div{color:#7CFFB0;font-size:14px}
</style></head><body>
<canvas id="c"></canvas>
<div class="panel"><h1>MATRIX RAIN — full background</h1><div>falling glyph columns behind the quiz panel (the classic). Costly-ish: ~1-2% CPU. Can run dimmed at 50% brightness.</div></div>
<div class="tag">effect_01_matrix_rain</div>
<script>
var c=document.getElementById('c');c.width=innerWidth;c.height=innerHeight;
var x=c.getContext('2d'),fs=18,cols=Math.floor(c.width/fs),drops=[];
for(var i=0;i<cols;i++)drops[i]=Math.floor(Math.random()*c.height/fs);
var chars="01234567890123456789ABCDEFXYZ<>/\\*-+=#%";
function step(){x.fillStyle="rgba(0,0,0,0.08)";x.fillRect(0,0,c.width,c.height);
 x.fillStyle="#00ff66";x.font=fs+"px monospace";
 for(var i=0;i<drops.length;i++){x.fillText(chars.charAt(Math.floor(Math.random()*chars.length)),i*fs,drops[i]*fs);
  if(drops[i]*fs>c.height&&Math.random()>0.975)drops[i]=0;drops[i]++;}}
for(var k=0;k<140;k++)step();   // pre-run so the screenshot shows full trails
</script>
</body></html>
